<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b5fa8" />
  <meta name="color-scheme" content="light" />
  <title>الخليفة</title>
  <base href="/" />
  <meta name="description" content="نظام إدارة الأقساط والتمويل — الخليفة" />
  <link rel="icon" type="image/x-icon" href="./assets/img/logo.jpeg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
    onload="this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
    />
  </noscript>

  <style>
    /* Critical inline CSS — paints the shell instantly */
    :root { --bg:#f8f7f5; --txt:#1a1a18; --bl:#1b5fa8; --brd:rgba(0,0,0,.1); }
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin:0; padding:0; }
    html { font-family: "Cairo", system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-size: 13px;
      direction: rtl;
      min-height: 100dvh;
      overflow: hidden;
    }
    .app-boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      gap: 14px;
      background: var(--bg);
    }
    .app-boot__logo {
      display: grid;
      grid-template-columns: 11px 11px;
      grid-template-rows: 11px 11px;
      gap: 4px;
    }
    .app-boot__logo i {
      display:block; border-radius:2px; background: var(--bl);
    }
    .app-boot__logo i:nth-child(2),
    .app-boot__logo i:nth-child(3) { background:#85B7EB; }
    .app-boot__spin {
      width: 28px; height: 28px;
      border: 2px solid var(--brd);
      border-top-color: var(--bl);
      border-radius: 50%;
      animation: app-boot-spin .8s linear infinite;
    }
    @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    app-root:not(:empty) ~ .app-boot,
    app-root:has(*) + .app-boot { display: none; }
  </style>
</head>

<body>
  <app-root></app-root>

  <div class="app-boot" aria-hidden="true">
    <span class="app-boot__logo"><i></i><i></i><i></i><i></i></span>
    <span class="app-boot__spin"></span>
  </div>
</body>

</html>
