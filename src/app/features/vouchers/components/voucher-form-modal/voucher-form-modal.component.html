<app-modal
  [open]="open()"
  title="إضافة سند"
  size="md"
  [closeOnBackdrop]="!submitting()"
  [closeOnEsc]="!submitting()"
  (closed)="close()"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="off">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">نوع السند</label>
        <select
          class="form-select"
          formControlName="type"
          [class.is-invalid]="isInvalid('type')"
        >
          @for (opt of typeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
        <app-form-error [control]="form.controls.type" label="نوع السند" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">المبلغ</label>
        <input
          type="number"
          class="form-control"
          formControlName="amount"
          min="0"
          step="0.01"
          dir="ltr"
          placeholder="0"
          [class.is-invalid]="isInvalid('amount')"
        />
        <app-form-error [control]="form.controls.amount" label="المبلغ" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">الخزينة</label>
        <select
          class="form-select"
          formControlName="treasuryId"
          [class.is-invalid]="isInvalid('treasuryId')"
        >
          <option [ngValue]="0" disabled>— اختر —</option>
          @for (t of activeTreasuries(); track t.id) {
            <option [ngValue]="t.id">{{ t.name }}</option>
          }
        </select>
        <app-form-error [control]="form.controls.treasuryId" label="الخزينة" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">التاريخ</label>
        <input
          type="date"
          class="form-control"
          formControlName="date"
          [class.is-invalid]="isInvalid('date')"
        />
        <app-form-error [control]="form.controls.date" label="التاريخ" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">نوع الجهة</label>
        <select
          class="form-select"
          formControlName="relatedPartyType"
          (change)="onPartyTypeChange($any($event.target).value)"
        >
          @for (opt of partyTypeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>

      @if (needsParty()) {
        <div class="col-12 col-md-6">
          <label class="form-label">الجهة</label>
          <select
            class="form-select"
            formControlName="relatedPartyId"
            [class.is-invalid]="isInvalid('relatedPartyId')"
          >
            <option [ngValue]="0" disabled>
              {{ partyLoading() ? 'جاري التحميل...' : '— اختر —' }}
            </option>
            @for (p of partyList(); track p.id) {
              <option [ngValue]="p.id">{{ p.name }}</option>
            }
          </select>
          <app-form-error [control]="form.controls.relatedPartyId" label="الجهة" />
        </div>
      }

      <div class="col-12">
        <label class="form-label">ملاحظات</label>
        <input
          type="text"
          class="form-control"
          formControlName="notes"
          autocomplete="off"
          placeholder="(اختياري)"
        />
      </div>
    </div>

    @if (serverError(); as msg) {
      <div class="alert alert-danger mt-3 mb-0" role="alert" style="font-size:11px;">
        {{ msg }}
      </div>
    }
  </form>

  <ng-container modal-footer>
    <button type="button" class="btn" [disabled]="submitting()" (click)="close()">
      إلغاء
    </button>
    <button
      type="button"
      class="btn btn-bl d-inline-flex align-items-center gap-2"
      [disabled]="submitting() || form.invalid"
      (click)="onSubmit()"
    >
      @if (submitting()) {
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      }
      <span>{{ submitting() ? 'جاري الحفظ...' : 'إضافة' }}</span>
    </button>
  </ng-container>
</app-modal>
