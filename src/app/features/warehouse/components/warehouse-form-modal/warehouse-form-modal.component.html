<app-modal
  [open]="open()"
  [title]="title()"
  size="md"
  [closeOnBackdrop]="!submitting()"
  [closeOnEsc]="!submitting()"
  (closed)="close()"
>
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    novalidate
    autocomplete="off"
  >
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">اسم المخزن</label>
        <input
          type="text"
          class="form-control"
          formControlName="name"
          autocomplete="off"
          placeholder="مثال: مخزن الإسكندرية"
          [class.is-invalid]="isInvalid('name')"
        />
        <app-form-error
          [control]="form.controls.name"
          label="اسم المخزن"
        />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">الموقع</label>
        <input
          type="text"
          class="form-control"
          formControlName="location"
          autocomplete="off"
          placeholder="مثال: الإسكندرية — مصر"
          [class.is-invalid]="isInvalid('location')"
        />
        <app-form-error
          [control]="form.controls.location"
          label="الموقع"
        />
      </div>

      <div class="col-12 d-flex align-items-end">
        <div class="form-check form-switch w-100">
          <input
            id="warehouse-active"
            type="checkbox"
            class="form-check-input"
            formControlName="isActive"
          />
          <label class="form-check-label" for="warehouse-active">
            مخزن فعّال
          </label>
        </div>
      </div>
    </div>

    @if (serverError(); as msg) {
      <div class="alert alert-danger mt-3 mb-0" role="alert" style="font-size:11px;">
        {{ msg }}
      </div>
    }
  </form>

  <ng-container modal-footer>
    <button
      type="button"
      class="btn"
      [disabled]="submitting()"
      (click)="close()"
    >
      {{ isView() ? 'إغلاق' : 'إلغاء' }}
    </button>

    @if (submitLabel(); as label) {
      <button
        type="button"
        class="btn btn-bl d-inline-flex align-items-center gap-2"
        [disabled]="submitting() || form.invalid"
        (click)="onSubmit()"
      >
        @if (submitting()) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        }
        <span>{{ submitting() ? 'جاري الحفظ...' : label }}</span>
      </button>
    }
  </ng-container>
</app-modal>
