<app-modal
  [open]="open()"
  [title]="title()"
  size="md"
  [closeOnBackdrop]="!submitting()"
  [closeOnEsc]="!submitting()"
  (closed)="close()"
>
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    novalidate
    autocomplete="off"
  >
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label">البريد الإلكتروني</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          autocomplete="off"
          placeholder="user@example.com"
          [class.is-invalid]="isInvalid('email')"
        />
        <app-form-error
          [control]="form.controls.email"
          label="البريد الإلكتروني"
        />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">رقم الجوال</label>
        <input
          type="tel"
          class="form-control"
          formControlName="phoneNumber"
          autocomplete="off"
          placeholder="01154113708"
          dir="ltr"
          [class.is-invalid]="isInvalid('phoneNumber')"
        />
        <app-form-error
          [control]="form.controls.phoneNumber"
          label="رقم الجوال"
        />
      </div>
      
      @if (!isView()) {
        <div class="col-12 col-md-6">
          <label class="form-label">
            كلمة المرور
            @if (mode() === 'edit') {
              <span class="form-label-hint">(اختيارية — اتركها فارغة للإبقاء على الحالية)</span>
            }
          </label>
          <app-password-input
            formControlName="password"
            [placeholder]="mode() === 'edit' ? 'اكتب كلمة مرور جديدة فقط لتغييرها' : '••••••••'"
            autocomplete="new-password"
          />
          <app-form-error
            [control]="form.controls.password"
            label="كلمة المرور"
          />
        </div>
      }

      <div class="col-12 col-md-6">
        <label class="form-label">الدور</label>
        <select
          class="form-select"
          formControlName="role"
          [class.is-invalid]="isInvalid('role')"
        >
          <option value="" disabled>
            {{ rolesLoading() ? 'جاري التحميل...' : 'اختر الدور' }}
          </option>
          @for (r of roles(); track r.id) {
            <option [value]="r.id">{{ r.nameAr }}</option>
          }
        </select>
        <app-form-error [control]="form.controls.role" label="الدور" />
      </div>
    </div>

    @if (serverError(); as msg) {
      <div class="alert alert-danger mt-3 mb-0" role="alert" style="font-size:11px;">
        {{ msg }}
      </div>
    }
  </form>

  <ng-container modal-footer>
    <button
      type="button"
      class="btn"
      [disabled]="submitting()"
      (click)="close()"
    >
      {{ isView() ? 'إغلاق' : 'إلغاء' }}
    </button>

    @if (submitLabel(); as label) {
      <button
        type="button"
        class="btn btn-bl d-inline-flex align-items-center gap-2"
        [disabled]="submitting() || form.invalid"
        (click)="onSubmit()"
      >
        @if (submitting()) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        }
        <span>{{ submitting() ? 'جاري الحفظ...' : label }}</span>
      </button>
    }
  </ng-container>
</app-modal>
