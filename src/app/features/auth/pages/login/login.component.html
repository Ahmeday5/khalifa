<h2 class="fw-bold mb-1" style="font-size:18px; color:var(--txt)">
  تسجيل الدخول
</h2>
<p class="mb-4" style="font-size:12px; color:var(--txt2)">
  أدخل بياناتك للوصول إلى النظام
</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div class="mb-3">
    <label class="form-label">البريد الإلكتروني</label>
    <input
      type="email"
      class="form-control"
      formControlName="email"
      autocomplete="email"
      placeholder="admin@khalifa.sa"
      [class.is-invalid]="isInvalid('email')"
    />
    <app-form-error [control]="form.controls.email" label="البريد الإلكتروني" />
  </div>

  <div class="mb-3">
    <label class="form-label">كلمة المرور</label>
    <app-password-input
      formControlName="password"
      placeholder="••••••••"
      autocomplete="current-password"
    />
    <app-form-error [control]="form.controls.password" label="كلمة المرور" />
  </div>

  <div class="form-check mb-3">
    <input
      class="form-check-input"
      type="checkbox"
      id="rememberMe"
      formControlName="rememberMe"
    />
    <label class="form-check-label" for="rememberMe" style="font-size:11px;">
      تذكرني
    </label>
  </div>

  @if (serverError(); as msg) {
    <div class="alert alert-danger" role="alert" style="font-size:11px;">
      {{ msg }}
    </div>
  }

  <button
    type="submit"
    class="btn btn-bl w-100 d-flex align-items-center justify-content-center gap-2"
    [disabled]="isSubmitting()"
  >
    @if (isSubmitting()) {
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      <span>جاري الدخول...</span>
    } @else {
      <span>دخول</span>
    }
  </button>
</form>
