<h2 class="login-title">تسجيل الدخول</h2>
<p class="login-subtitle">أدخل بياناتك للوصول إلى النظام</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div class="mb-3">
    <label class="form-label">البريد الإلكتروني</label>
    <div class="input-icon-wrap">
      <i class="fa-solid fa-envelope input-icon"></i>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        autocomplete="email"
        placeholder="admin@khalifa.sa"
        [class.is-invalid]="isInvalid('email')"
      />
    </div>
    <app-form-error [control]="form.controls.email" label="البريد الإلكتروني" />
  </div>

  <div class="mb-3">
    <label class="form-label">كلمة المرور</label>
    <div class="input-icon-wrap">
      <i class="fa-solid fa-lock input-icon"></i>
      <app-password-input
        formControlName="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>
    <app-form-error [control]="form.controls.password" label="كلمة المرور" />
  </div>

  <div class="form-check mb-3">
    <input
      class="form-check-input"
      type="checkbox"
      id="rememberMe"
      formControlName="rememberMe"
    />
    <label class="form-check-label" for="rememberMe" style="font-size:11px;">
      تذكرني
    </label>
  </div>

  @if (serverError(); as msg) {
    <div class="alert alert-danger" role="alert" style="font-size:11px;">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ msg }}</span>
    </div>
  }

  <button
    type="submit"
    class="btn btn-bl w-100 d-flex align-items-center justify-content-center gap-2 login-submit"
    [disabled]="isSubmitting()"
  >
    @if (isSubmitting()) {
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      <span>جاري الدخول...</span>
    } @else {
      <i class="fa-solid fa-arrow-right-to-bracket"></i>
      <span>دخول</span>
    }
  </button>
</form>
