<div class="pw-wrap" [class.is-invalid]="isInvalid()">
  <input class="form-control pw-input" [type]="visible() ? 'text' : 'password'" [value]="value" [disabled]="disabled()"
    [placeholder]="placeholder()" [attr.autocomplete]="autocomplete()" [attr.aria-invalid]="isInvalid() || null"
    (input)="onInput($event)" (blur)="onBlur()" />

  <button type="button" class="pw-toggle" [attr.aria-label]="visible() ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور'"
    [attr.aria-pressed]="visible()" [disabled]="disabled()" (click)="toggle()" tabindex="-1">
    @if (visible()) {
    <!-- eye-off -->
    <i class="fa-solid fa-eye-slash"></i>
    } @else {
    <!-- eye -->
    <i class="fa-solid fa-eye"></i>
    }
  </button>
</div>
