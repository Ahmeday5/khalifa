<div
  class="toast-container"
  [class]="positionClass()"
  dir="rtl"
  aria-live="polite"
  aria-atomic="true"
  [@toastList]="toasts().length"
>
  @for (toast of toasts(); track toast.id) {
    <div
      class="toast toast-{{ toast.type }}"
      [class.is-paused]="isPaused(toast)"
      [style.--toast-duration.ms]="toast.duration"
      role="status"
      (mouseenter)="onMouseEnter(toast.id)"
      (mouseleave)="onMouseLeave(toast.id)"
    >
      <div class="toast-accent" aria-hidden="true"></div>

      <div class="toast-icon" aria-hidden="true">
        @switch (toast.type) {
          @case ('success') {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M5 10.5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('error') {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          }
          @case ('warning') {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M10 4v7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="14.5" r="1" fill="currentColor"/>
            </svg>
          }
          @case ('info') {
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M10 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="5.5" r="1" fill="currentColor"/>
            </svg>
          }
        }
      </div>

      <div class="toast-body">
        @if (toast.title) {
          <div class="toast-title">{{ toast.title }}</div>
        }
        <div class="toast-msg">{{ toast.message }}</div>
      </div>

      @if (toast.action) {
        <button
          type="button"
          class="toast-action"
          (click)="onAction(toast)"
        >
          {{ toast.action.label }}
        </button>
      }

      @if (toast.closable) {
        <button
          type="button"
          class="toast-close"
          aria-label="إغلاق"
          (click)="dismiss(toast.id)"
        >&times;</button>
      }

      @if (toast.duration > 0) {
        <div class="toast-progress">
          <div class="toast-progress-bar"></div>
        </div>
      }
    </div>
  }
</div>
